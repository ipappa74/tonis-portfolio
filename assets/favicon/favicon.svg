  />

  <ellipse
    cx="24"
    cy="18"
    rx="22"
    ry="12"
    fill="url(#shine)"
  />

  <text
    x="50%"
    y="53%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Inter, Arial, sans-serif"
    font-size="24"
    font-weight="700"
